<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIネタツイメーカー Pro</title>
<style>
body{font-family:sans-serif;max-width:900px;margin:40px auto;padding:20px}
input,textarea,button,select{width:100%;padding:12px;margin:8px 0;box-sizing:border-box}
button{cursor:pointer}
#out{white-space:pre-wrap;border:1px solid #ccc;padding:16px;border-radius:8px;min-height:120px}
.small{font-size:12px;color:#666}
</style>
</head>
<body>
<h1>AIネタツイメーカー Pro</h1>

<label>OpenAI API Key</label>
<input id="apiKey" type="password" placeholder="sk-...">

<label>ネタのテーマ</label>
<input id="theme" placeholder="例: 猫、コンビニ、プログラマー">

<label>ジャンル</label>
<select id="genre">
<option>バズ狙い</option>
<option>あるある</option>
<option>シュール</option>
<option>意識高い系</option>
<option>自虐</option>
</select>

<button onclick="generateTweet()">AIで生成</button>

<h3>生成結果</h3>
<div id="out">ここに表示されます</div>

<script>
async function generateTweet(){
  const apiKey = document.getElementById("apiKey").value.trim();
  const theme = document.getElementById("theme").value.trim();
  const genre = document.getElementById("genre").value;

  if(!apiKey){
    alert("OpenAI API Keyを入力してください");
    return;
  }

  document.getElementById("out").textContent = "生成中...";

  try{
    const response = await fetch("https://api.openai.com/v1/responses",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + apiKey
      },
      body:JSON.stringify({
        model:"gpt-5",
        input:`X(Twitter)向けの短く面白いネタツイを1本作成してください。
テーマ: ${theme}
ジャンル: ${genre}
140文字程度。
改行OK。
余計な説明不要。`
      })
    });

    const data = await response.json();

    const text =
      data.output?.map(o =>
        o.content?.map(c => c.text || "").join("")
      ).join("\n") || "生成失敗";

    document.getElementById("out").textContent = text;
  }catch(err){
    document.getElementById("out").textContent =
      "エラー: " + err.message;
  }
}
</script>

<p class="small">
注意: 本番環境ではAPIキーをブラウザに直接入力させず、
サーバー経由でOpenAI APIを呼び出してください。
</p>
</body>
</html>
