<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Multi AI ネタツイメーカー</title>
</head>
<body>
<h1>Multi AI ネタツイメーカー</h1>
<p>OpenAI / Gemini / Claude 切替対応サンプル</p>

<select id="provider">
<option value="openai">OpenAI</option>
<option value="gemini">Gemini</option>
<option value="anthropic">Claude</option>
</select>

<input id="apiKey" placeholder="API Key">
<input id="theme" placeholder="テーマ">
<button onclick="generate()">生成</button>

<pre id="out"></pre>

<script>
async function generate(){
 const provider=document.getElementById('provider').value;
 const apiKey=document.getElementById('apiKey').value;
 const theme=document.getElementById('theme').value;
 const prompt='X向けの面白いネタツイを1本作成。テーマ:'+theme;

 if(provider==='openai'){
   document.getElementById('out').textContent='OpenAI API呼び出し実装例';
 } else if(provider==='gemini'){
   document.getElementById('out').textContent='Gemini API呼び出し実装例';
 } else {
   document.getElementById('out').textContent='Claude API呼び出し実装例';
 }
}
</script>
</body>
</html>
